tasks:
- task_id: multi-file-code-archaeology
  intent: Find all files touched by a broad agentic-eval reporting change.
  required_verdicts:
  - id: affected_files_identified
    description: Core runner and tests are both identified as affected paths.
  - id: evidence_backed_summary
    description: The analysis cites concrete artifacts rather than prose-only claims.
  - id: gate_passed_honestly
    description: The gated workflow accepted with required receipts.
  arms:
    lead_direct:
      budget:
        token_budget: 14000
        budget_usd_limit: 4.0
      workflow_result:
        status: accepted
        steps:
        - gate: prd_review
          status: accepted
          attempt_count: 1
        - gate: issues_review
          status: accepted
          attempt_count: 1
        - gate: tdd_review
          status: accepted
          attempt_count: 1
        - gate: implementation_plan
          status: accepted
          attempt_count: 1
        - gate: execution
          status: accepted
          attempt_count: 1
        - gate: outcome_review
          status: accepted
          attempt_count: 1
        final_gate_result:
          gate: outcome_review
          status: accepted
          independent_reviewer_results: &id001
          - reviewer_id: independent-reviewer-0
            provider_family: google
            assurance_grade: text_only
            decision: accept
            confidence: 0.88
          - reviewer_id: independent-reviewer-1
            provider_family: openai
            assurance_grade: agentic
            decision: accept
            confidence: 0.91
          probes:
            P1:
              status: green
            P2:
              status: green
            P3:
              status: green
      metrics:
        wall_clock_s: 300
        cost_usd: 2.9
        operator_interventions: 0
        time_to_first_useful_finding: 95
        time_to_accepted_outcome: 300
        orchestration_overhead_s: 12
        reviewer_time_s: 50
        worker_idle_wait_s: 0
      verdict_evidence:
