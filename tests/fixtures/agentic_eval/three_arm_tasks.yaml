            - {kind: artifact_path, ref: tests/test_codex_resume.py, status: passed}
          gate_passed_honestly:
            - {kind: probe_receipt, ref: outcome_review:P1-P3-P13-P14, status: passed}
  - task_id: reviewer-roster-calibration
    intent: Verify calibration rejects mixed-lineage rows.
    required_verdicts:
